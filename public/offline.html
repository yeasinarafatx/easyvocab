<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vocab Speak Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f1a;
        --card: rgba(15, 23, 48, 0.92);
        --border: rgba(103, 232, 249, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(34, 211, 238, 0.12), transparent 40%), var(--bg);
        color: var(--text);
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }
      h1 { margin: 0 0 12px; font-size: 28px; line-height: 1.2; }
      p { margin: 0 0 14px; color: var(--muted); line-height: 1.7; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(34, 211, 238, 0.26);
        background: rgba(34, 211, 238, 0.1);
        color: #cffafe;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 22px;
      }
      a {
        color: #081018;
        background: linear-gradient(90deg, #67e8f9, #34d399);
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 700;
      }
      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Offline mode</div>
      <h1>You are offline</h1>
      <p>
        Cached practice and flashcards can still work if you already opened them before.
        When the network returns, the app will sync fresh data automatically.
      </p>
      <p>
        If this is your first visit, please reconnect once so the word data and app shell can be cached.
      </p>
      <div class="actions">
        <a href="/">Go home</a>
        <a href="/demo" class="secondary">Try demo</a>
      </div>
    </main>
  </body>
</html>
